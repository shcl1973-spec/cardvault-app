<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CardVault — 名片與客戶管理</title>
  <meta name="description" content="現代化名片與客戶詳細記錄管理系統，輕鬆管理您的商業聯絡人。" />
  <!-- PWA / Mobile -->
  <meta name="theme-color" content="#141720" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CardVault" />
  <link rel="manifest" href="manifest.json" />
  <!-- Icons for iOS & Android -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App Shell -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          <span class="logo-text">CardVault</span>
        </div>
        <button id="sidebar-toggle" class="icon-btn" aria-label="收合側欄">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="搜尋客戶..." autocomplete="off" />
        <button id="clear-search" class="clear-btn" style="display:none" aria-label="清除搜尋">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all" id="nav-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>所有客戶</span>
          <span class="badge" id="badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="favorite" id="nav-favorite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span>收藏客戶</span>
          <span class="badge" id="badge-favorite">0</span>
        </button>
      </nav>

      <div class="sidebar-section-title">標籤篩選</div>
      <div id="tag-filter-list" class="tag-filter-list"></div>

      <div class="sidebar-footer">
        <button id="add-contact-btn" class="add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          新增客戶
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header class="main-header">
        <div class="header-left">
          <h1 id="main-title">所有客戶</h1>
          <span id="contact-count" class="contact-count"></span>
        </div>
        <div class="header-right">
          <div class="view-toggle">
            <button class="view-btn active" id="view-grid" aria-label="網格檢視">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>
            <button class="view-btn" id="view-list" aria-label="列表檢視">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
          </div>
          <button id="add-contact-btn-header" class="add-btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增客戶
          </button>
        </div>
      </header>

      <div id="contacts-container" class="contacts-grid"></div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </div>
        <h2>尚無客戶資料</h2>
        <p>點擊「新增客戶」開始建立您的名片庫</p>
        <button class="add-btn" id="empty-add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新增第一位客戶
        </button>
      </div>
    </main>

    <!-- Detail Panel -->
    <div id="detail-panel" class="detail-panel">
      <div class="detail-panel-inner">
        <div class="detail-header">
          <button id="close-detail" class="icon-btn" aria-label="關閉">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div class="detail-actions">
            <button id="detail-card-preview-btn" class="icon-btn" aria-label="名片預覽" title="查看名片正反面">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
              </svg>
            </button>
            <button id="detail-favorite-btn" class="icon-btn" aria-label="收藏">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
            <button id="detail-edit-btn" class="icon-btn" aria-label="編輯">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button id="detail-delete-btn" class="icon-btn danger" aria-label="刪除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="detail-content"></div>
      </div>
    </div>
    <div id="detail-overlay" class="detail-overlay"></div>

  </div><!-- /#app -->

  <!-- Modal: Add/Edit Contact -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">新增客戶</h2>
        <button id="modal-close" class="icon-btn" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="contact-form" novalidate>
          <!-- Avatar Preview -->
          <div class="avatar-preview-area">
            <div id="form-avatar" class="avatar-lg"></div>
          </div>

          <div class="form-grid">
            <div class="form-group full-width">
              <label for="f-name">姓名 <span class="required">*</span></label>
              <input id="f-name" type="text" placeholder="輸入客戶姓名" required />
            </div>
            <div class="form-group">
              <label for="f-title">職稱</label>
              <input id="f-title" type="text" placeholder="例：業務經理" />
            </div>
            <div class="form-group">
              <label for="f-company">公司</label>
              <input id="f-company" type="text" placeholder="公司名稱" />
            </div>
            <div class="form-group">
              <label for="f-phone">電話</label>
              <input id="f-phone" type="tel" placeholder="+886 2 1234 5678" />
            </div>
            <div class="form-group">
              <label for="f-email">Email</label>
              <input id="f-email" type="email" placeholder="example@email.com" />
            </div>
            <div class="form-group full-width">
              <label for="f-address">地址</label>
              <input id="f-address" type="text" placeholder="公司或聯絡地址" />
            </div>
            <div class="form-group full-width">
              <label for="f-website">網站</label>
              <input id="f-website" type="url" placeholder="https://example.com" />
            </div>
            <div class="form-group full-width">
              <label for="f-tags">標籤</label>
              <div class="tag-input-wrap">
                <div id="tag-chips" class="tag-chips"></div>
                <input id="f-tags" type="text" placeholder="輸入標籤後按 Enter" />
              </div>
            </div>
            <div class="form-group full-width">
              <label for="f-notes">備註</label>
              <textarea id="f-notes" rows="3" placeholder="記錄重要資訊..."></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-save" class="btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Interaction -->
  <div id="interaction-modal-overlay" class="modal-overlay" style="display:none">
    <div id="interaction-modal" class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="interaction-modal-title">
      <div class="modal-header">
        <h2 id="interaction-modal-title">新增互動記錄</h2>
        <button id="interaction-modal-close" class="icon-btn" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="interaction-form" novalidate>
          <div class="form-group">
            <label for="i-date">日期</label>
            <input id="i-date" type="date" />
          </div>
          <div class="form-group">
            <label for="i-type">類型</label>
            <select id="i-type">
              <option value="電話">📞 電話</option>
              <option value="Email">📧 Email</option>
              <option value="會議">🤝 會議</option>
              <option value="拜訪">🏢 拜訪</option>
              <option value="其他">💬 其他</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label for="i-note">記錄內容 <span class="required">*</span></label>
            <textarea id="i-note" rows="3" placeholder="記錄此次互動的詳情..." required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="interaction-cancel" class="btn-secondary">取消</button>
        <button id="interaction-save" class="btn-primary">新增</button>
      </div>
    </div>
  </div>

  <!-- Modal: Business Card Preview (Front & Back) -->
  <div id="card-preview-overlay" class="modal-overlay" style="display:none">
    <div class="card-preview-modal" role="dialog" aria-modal="true" aria-label="名片預覽">
      <div class="card-preview-header">
        <span class="card-preview-title">名片預覽</span>
        <div class="card-preview-header-actions">
          <button id="card-preview-flip-btn" class="card-flip-hint-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
            翻轉
          </button>
          <button id="card-preview-close" class="icon-btn" aria-label="關閉">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 3D Flip Card -->
      <div class="card-flip-scene" id="card-flip-scene">
        <div class="card-flip-card" id="card-flip-card">
          <!-- Front -->
          <div class="card-face card-front" id="biz-card-front">
            <div class="biz-card-accent-bar"></div>
            <div class="biz-card-front-body">
              <div class="biz-card-logo-area" id="biz-card-avatar"></div>
              <div class="biz-card-info">
                <div class="biz-card-name" id="biz-front-name"></div>
                <div class="biz-card-title" id="biz-front-title"></div>
                <div class="biz-card-company" id="biz-front-company"></div>
              </div>
            </div>
            <div class="biz-card-front-footer">
              <div class="biz-card-contact-row" id="biz-front-phone"></div>
              <div class="biz-card-contact-row" id="biz-front-email"></div>
            </div>
            <div class="biz-card-label">正面</div>
          </div>
          <!-- Back -->
          <div class="card-face card-back" id="biz-card-back">
            <div class="biz-back-pattern"></div>
            <div class="biz-card-back-body">
              <div class="biz-back-logo" id="biz-back-avatar"></div>
              <div class="biz-back-items">
                <div class="biz-back-row" id="biz-back-address"></div>
                <div class="biz-back-row" id="biz-back-website"></div>
                <div class="biz-back-row" id="biz-back-notes"></div>
              </div>
              <div class="biz-back-tags" id="biz-back-tags"></div>
            </div>
            <div class="biz-card-label" style="right:auto;left:14px">背面</div>
          </div>
        </div>
      </div>

      <p class="card-flip-hint">點擊名片或按「翻轉」查看背面</p>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-bottom-nav" class="mobile-bottom-nav">
    <button class="mobile-nav-item active" data-filter="all" id="mob-nav-all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>全部</span>
    </button>
    <button class="mobile-nav-item" data-filter="favorite" id="mob-nav-favorite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>收藏</span>
    </button>
    <button class="mobile-nav-item mobile-add-center" id="mob-add-btn" aria-label="新增客戶">
      <div class="mob-add-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </button>
    <button class="mobile-nav-item" id="mob-search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>搜尋</span>
    </button>
    <button class="mobile-nav-item" id="mob-menu-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span>選單</span>
    </button>
  </nav>

  <!-- Mobile Search Bar (slide-in) -->
  <div id="mobile-search-bar" class="mobile-search-bar">
    <div class="mobile-search-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="mobile-search-input" type="text" placeholder="搜尋客戶姓名、公司、標籤..." autocomplete="off" />
      <button id="mobile-search-close" class="icon-btn" aria-label="關閉搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Drawer Menu -->
  <div id="mobile-drawer-overlay" class="mobile-drawer-overlay"></div>
  <div id="mobile-drawer" class="mobile-drawer">
    <div class="mobile-drawer-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </div>
        <span class="logo-text">CardVault</span>
      </div>
      <button id="mobile-drawer-close" class="icon-btn" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="mobile-drawer-body">
      <div class="sidebar-section-title" style="padding-top:8px">篩選</div>
      <nav class="sidebar-nav" style="padding:4px 12px">
        <button class="nav-item active" data-filter="all" id="drawer-nav-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
          <span>所有客戶</span>
          <span class="badge" id="drawer-badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="favorite" id="drawer-nav-favorite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span>收藏客戶</span>
          <span class="badge" id="drawer-badge-favorite">0</span>
        </button>
      </nav>
      <div class="sidebar-section-title">標籤篩選</div>
      <div id="drawer-tag-filter-list" class="tag-filter-list" style="max-height:none;padding:0 12px"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
